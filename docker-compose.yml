services:
  apwhy:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: apwhy
    restart: unless-stopped
    environment:
      APWHY_PORT: 3001
      DATABASE_URL: postgresql://apwhy:${APWHY_DB_PASSWORD:-apwhy123}@apwhy-db:5432/apwhy
      APWHY_PUBLIC_BASE_URL: ${APWHY_PUBLIC_BASE_URL:-http://localhost:3001}
      APWHY_DEPLOY_BASE_DIR: /data/deployments
      BUILDKIT_HOST: ${BUILDKIT_HOST:-docker-container://apwhy-buildkit}
      APWHY_DEPLOY_DOCKER_NETWORK: ${APWHY_DEPLOY_DOCKER_NETWORK:-apwhy-network}
      UMAMI_BASE_URL: ${UMAMI_BASE_URL:-}
      UMAMI_API_KEY: ${UMAMI_API_KEY:-}
      UMAMI_SCRIPT_URL: ${UMAMI_SCRIPT_URL:-}
      UMAMI_WEBSITE_ID: ${UMAMI_WEBSITE_ID:-}
    depends_on:
      apwhy-db:
        condition: service_healthy
      buildkit:
        condition: service_started
    networks:
      - apwhy-network
    ports:
      - "3001:3001"
    volumes:
      - apwhy-data:/data
      - /var/run/docker.sock:/var/run/docker.sock
    healthcheck:
      test: ["CMD", "curl", "-fsS", "http://127.0.0.1:3001/health"]
      interval: 20s
      timeout: 5s
      retries: 5
    mem_limit: 256m
    cpus: 0.50

  apwhy-db:
    image: postgres:15-alpine
    container_name: apwhy-db
    restart: unless-stopped
    environment:
      POSTGRES_DB: apwhy
      POSTGRES_USER: apwhy
      POSTGRES_PASSWORD: ${APWHY_DB_PASSWORD:-apwhy123}
    volumes:
      - apwhy-db:/var/lib/postgresql/data
    networks:
      - apwhy-network
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U apwhy -d apwhy"]
      interval: 20s
      timeout: 5s
      retries: 10
    mem_limit: 512m
    cpus: 0.75

  buildkit:
    image: moby/buildkit:latest
    container_name: apwhy-buildkit
    privileged: true
    restart: unless-stopped
    networks:
      - apwhy-network

volumes:
  apwhy-data:
  apwhy-db:

networks:
  apwhy-network:
    driver: bridge
    name: apwhy-network
