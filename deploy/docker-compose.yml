services:
  apwhy:
    build:
      context: ..
      dockerfile: Dockerfile
    container_name: apwhy
    restart: unless-stopped
    environment:
      APWHY_PORT: 3001
      DATABASE_URL: postgresql://apwhy:${APWHY_DB_PASSWORD:-apwhy123}@apwhy-db:5432/apwhy
      APWHY_PUBLIC_BASE_URL: ${APWHY_PUBLIC_BASE_URL:-http://${APWHY_DOMAIN:-apwhy.localhost}}
      APWHY_DEPLOY_BASE_DIR: /data/deployments
      BUILDKIT_HOST: ${BUILDKIT_HOST:-docker-container://apwhy-buildkit}
      APWHY_DEPLOY_DOCKER_NETWORK: ${APWHY_DEPLOY_DOCKER_NETWORK:-apwhy-internal}
      UMAMI_BASE_URL: ${UMAMI_BASE_URL:-}
      UMAMI_API_KEY: ${UMAMI_API_KEY:-}
      UMAMI_SCRIPT_URL: ${UMAMI_SCRIPT_URL:-}
      UMAMI_WEBSITE_ID: ${UMAMI_WEBSITE_ID:-}
    volumes:
      - apwhy-data:/data
      - /var/run/docker.sock:/var/run/docker.sock
    networks:
      - proxy
      - internal
    depends_on:
      apwhy-db:
        condition: service_healthy
      buildkit:
        condition: service_started
    labels:
      - traefik.enable=true
      - traefik.http.routers.apwhy.rule=Host(`${APWHY_DOMAIN:-apwhy.localhost}`)
      - traefik.http.routers.apwhy.entrypoints=web
      - traefik.http.services.apwhy.loadbalancer.server.port=3001
    healthcheck:
      test: ["CMD", "curl", "-fsS", "http://127.0.0.1:3001/health"]
      interval: 20s
      timeout: 5s
      retries: 5
    mem_limit: 256m
    cpus: 0.50

  buildkit:
    image: moby/buildkit:latest
    container_name: apwhy-buildkit
    privileged: true
    restart: unless-stopped
    networks:
      - internal

  apwhy-db:
    image: postgres:16-alpine
    container_name: apwhy-db
    restart: unless-stopped
    environment:
      POSTGRES_DB: apwhy
      POSTGRES_USER: apwhy
      POSTGRES_PASSWORD: ${APWHY_DB_PASSWORD:-apwhy123}
    volumes:
      - apwhy-db:/var/lib/postgresql/data
    networks:
      - internal
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U apwhy -d apwhy"]
      interval: 20s
      timeout: 5s
      retries: 10
    mem_limit: 512m
    cpus: 0.75

  traefik:
    image: traefik:v3.2
    container_name: apwhy-traefik
    restart: unless-stopped
    command:
      - --api.dashboard=true
      - --providers.docker=true
      - --providers.docker.exposedbydefault=false
      - --entrypoints.web.address=:80
    ports:
      - "80:80"
      - "8080:8080"
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock:ro
    networks:
      - proxy
    mem_limit: 128m
    cpus: 0.50

  umami-db:
    image: postgres:16-alpine
    container_name: umami-db
    restart: unless-stopped
    environment:
      POSTGRES_DB: umami
      POSTGRES_USER: umami
      POSTGRES_PASSWORD: ${UMAMI_DB_PASSWORD:-umami}
    volumes:
      - umami-db:/var/lib/postgresql/data
    networks:
      - internal
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U umami -d umami"]
      interval: 20s
      timeout: 5s
      retries: 10
    mem_limit: 512m
    cpus: 0.75

  umami:
    image: ghcr.io/umami-software/umami:postgresql-latest
    container_name: umami
    restart: unless-stopped
    environment:
      DATABASE_URL: postgresql://umami:${UMAMI_DB_PASSWORD:-umami}@umami-db:5432/umami
      DATABASE_TYPE: postgresql
      HASH_SALT: ${UMAMI_HASH_SALT:-change-me-very-long-random-salt}
      APP_SECRET: ${UMAMI_APP_SECRET:-change-me-very-long-secret}
    depends_on:
      umami-db:
        condition: service_healthy
    networks:
      - proxy
      - internal
    labels:
      - traefik.enable=true
      - traefik.http.routers.umami.rule=Host(`${UMAMI_DOMAIN:-umami.localhost}`)
      - traefik.http.routers.umami.entrypoints=web
      - traefik.http.services.umami.loadbalancer.server.port=3000
    healthcheck:
      test: ["CMD", "wget", "-qO", "-", "http://127.0.0.1:3000/api/health"]
      interval: 30s
      timeout: 5s
      retries: 10
    mem_limit: 384m
    cpus: 0.75

volumes:
  apwhy-data:
  apwhy-db:
  umami-db:

networks:
  proxy:
    name: apwhy-proxy
  internal:
    name: apwhy-internal
